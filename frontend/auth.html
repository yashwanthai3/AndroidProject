<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auth - Android Malware Detection</title>

<style>
body{
margin:0;
font-family:Segoe UI;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

/* Same Cybersecurity Background */
background:
linear-gradient(rgba(5,10,25,0.9), rgba(5,10,25,0.95)),
url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1500&q=80');

background-size:cover;
background-position:center;
color:white;
}

/* Glass Container */
.container{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:40px;
border-radius:20px;
width:350px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* Title */
h2{
margin-bottom:20px;
background:linear-gradient(90deg,#00c6ff,#7c3aed);
-webkit-background-clip:text;
color:transparent;
}

/* Inputs */
input{
width:90%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.15);
color:white;
outline:none;
}

/* Button */
.btn{
margin-top:15px;
padding:12px 30px;
border:none;
border-radius:25px;
background:linear-gradient(90deg,#00c6ff,#7c3aed);
color:white;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(124,58,237,0.6);
}

/* Toggle Text */
.toggle{
margin-top:15px;
cursor:pointer;
font-size:14px;
color:#cbd5f5;
}

/* Small heading */
.sub{
font-size:13px;
color:#94a3b8;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<!-- SIGN IN -->
<div id="signin">
<h2>Sign In</h2>
<div class="sub">Access your malware detection dashboard</div>

<input type="text" placeholder="Username">
<input type="password" placeholder="Password">

<button class="btn" onclick="login()">Login</button>

<p class="toggle" onclick="toggle()">Don't have an account? Sign Up</p>
</div>

<!-- SIGN UP -->
<div id="signup" style="display:none;">
<h2>Create Account</h2>
<div class="sub">Register for secure malware detection</div>

<input type="text" placeholder="Username">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<button class="btn" onclick="register()">Register</button>

<p class="toggle" onclick="toggle()">Already have an account? Sign In</p>
</div>

</div>

<script>

/* Toggle between pages */
function toggle(){
let signIn=document.getElementById("signin");
let signUp=document.getElementById("signup");

signIn.style.display = signIn.style.display==="none" ? "block" : "none";
signUp.style.display = signUp.style.display==="none" ? "block" : "none";
}

/* Actions */
function login(){
window.location.href = "dashboard.html";
}

function register(){
alert("Account Created → Please Sign In");
toggle();
}

</script>

</body>
</html>
