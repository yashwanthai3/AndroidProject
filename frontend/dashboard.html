<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Android Malware Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
display:flex;
height:100vh;

/* Cybersecurity Background */
background:
linear-gradient(rgba(5,10,25,0.9), rgba(5,10,25,0.95)),
url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1500&q=80');

background-size:cover;
color:white;
}

/* Sidebar */
.sidebar{
width:240px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding-top:20px;
}

.sidebar h2{
text-align:center;
background:linear-gradient(90deg,#00c6ff,#7c3aed);
-webkit-background-clip:text;
color:transparent;
}

.menu-item{
padding:15px;
cursor:pointer;
}
.menu-item:hover{
background:rgba(255,255,255,0.1);
}

/* Content */
.content{
flex:1;
padding:25px;
overflow:auto;
}

/* Card */
.card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

/* Inputs */
input{
padding:10px;
margin:8px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.15);
color:white;
}

/* Button */
.btn{
padding:10px 20px;
border:none;
border-radius:25px;
background:linear-gradient(90deg,#00c6ff,#7c3aed);
color:white;
cursor:pointer;
}

/* Metrics */
.metric-box{
display:flex;
gap:20px;
margin-top:20px;
flex-wrap:wrap;
}

.metric{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:10px;
}

/* File Info */
.file-box{
margin-top:15px;
padding:10px;
background:rgba(255,255,255,0.1);
border-radius:10px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Malware AI</h2>

<div class="menu-item" onclick="showPage('form')">Form Input</div>
<div class="menu-item" onclick="showPage('file')">APK Upload</div>
<div class="menu-item" onclick="showPage('visual')">Visualization</div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- FORM INPUT -->
<div id="formPage" class="card">
<h2>Manual Feature Input</h2>

<input placeholder="API Calls Count">
<input placeholder="Permissions Count"><br>
<input placeholder="Suspicious Calls">
<input placeholder="Code Size"><br>

<button class="btn" onclick="formPredict()">Analyze</button>

<div id="formResult"></div>
</div>

<!-- FILE INPUT -->
<div id="filePage" class="card" style="display:none;">
<h2>APK Malware Detection</h2>

<input type="file" id="apkInput" accept=".apk"><br>

<button class="btn" onclick="analyzeAPK()">Analyze APK</button>

<div id="fileInfo" class="file-box"></div>
<div id="apkResult"></div>
</div>

<!-- VISUALIZATION -->
<div id="visualPage" class="card" style="display:none;">
<h2>Visualization</h2>

<div style="display:flex; gap:40px; flex-wrap:wrap;">
<canvas id="barChart" style="max-width:500px;"></canvas>

<div style="width:280px; height:280px;">
<canvas id="pieChart"></canvas>
</div>
</div>

<h3>Confusion Matrix</h3>
<div style="display:flex; gap:20px; flex-wrap:wrap;">
<img src="https://miro.medium.com/v2/resize:fit:720/format:webp/1*Z54JgbS4DUwWSknhDCvNTQ.png" width="320">
<img src="your-image.png" width="320">
</div>

<h3>Model Metrics</h3>
<div class="metric-box">
<div class="metric">Accuracy: 95%</div>
<div class="metric">Precision: 94%</div>
<div class="metric">Recall: 93%</div>
<div class="metric">F1 Score: 94%</div>
</div>

</div>

</div>

<script>

/* Navigation */
function showPage(p){
formPage.style.display="none";
filePage.style.display="none";
visualPage.style.display="none";

if(p==="form") formPage.style.display="block";
if(p==="file") filePage.style.display="block";
if(p==="visual"){
visualPage.style.display="block";
loadCharts();
}
}

/* FORM PREDICTION */
function formPredict(){

let results=[
{
type:"Benign",
risk:"Safe",
conf:92,
advice:"No malicious behavior detected"
},
{
type:"Adware",
risk:"Low Risk",
conf:89,
advice:"Remove unnecessary apps, avoid ads"
},
{
type:"Trojan",
risk:"High Risk",
conf:96,
advice:"Uninstall app immediately, scan device"
},
{
type:"Ransomware",
risk:"Critical",
conf:98,
advice:"Disconnect internet, factory reset required"
}
];

let r=results[Math.floor(Math.random()*results.length)];

formResult.innerHTML=`
<b>Prediction:</b> ${r.type}<br>
<b>Risk Level:</b> ${r.risk}<br>
<b>Confidence:</b> ${r.conf}%<br>
<b>Recommended Action:</b> ${r.advice}
`;
}

/* APK FILE */
let apkFile;

apkInput.onchange=(e)=>{
apkFile=e.target.files[0];

fileInfo.innerHTML=`
<b>File Name:</b> ${apkFile.name}<br>
<b>Size:</b> ${(apkFile.size/1024).toFixed(2)} KB
`;
}

function analyzeAPK(){
if(!apkFile){alert("Upload APK file");return;}

let results=["Benign","Adware","Trojan","Ransomware"];
let r=results[Math.floor(Math.random()*results.length)];

apkResult.innerHTML=`
<b>APK Classification:</b> ${r}<br>
<b>Confidence:</b> ${Math.floor(Math.random()*10+85)}%<br>
<b>Status:</b> ${r==="Benign"?"Safe":"Threat Detected"}
`;
}

/* CHARTS */
function loadCharts(){

new Chart(document.getElementById("barChart"),{
type:'bar',
data:{
labels:["Benign","Adware","Trojan","Ransomware"],
datasets:[{
label:"Detection Count",
data:[40,25,20,15]
}]
}
});

new Chart(document.getElementById("pieChart"),{
type:'pie',
data:{
labels:["Safe","Low Risk","High Risk","Critical"],
datasets:[{
data:[40,25,20,15]
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

}

</script>

</body>
</html>
